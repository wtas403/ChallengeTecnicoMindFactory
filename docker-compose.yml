services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-challenge_mindfactory}
      MYSQL_USER: ${MYSQL_USER:-challenge}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-challenge}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./ChallengeTecnicoBackend
    environment:
      PORT: 3000
      CORS_ORIGIN: http://localhost:4200
      DATABASE_URL: mysql://${MYSQL_USER:-challenge}:${MYSQL_PASSWORD:-challenge}@db:3306/${MYSQL_DATABASE:-challenge_mindfactory}
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm run prisma:push && npm run prisma:seed && npm run build && npm run start"
    ports:
      - "3000:3000"

  web:
    build:
      context: ./ChallengeTecnicoFrontend
    depends_on:
      - api
    ports:
      - "4200:4200"

volumes:
  mysql-data:
